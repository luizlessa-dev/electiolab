name: Ingest Google Ads (weekly)

on:
  schedule:
    # Toda segunda-feira 11:30 UTC (08:30 BRT) — depois do digest semanal
    - cron: "30 11 * * 1"
  workflow_dispatch: # também pode rodar manual

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run Google Ads ingest
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/ingest-google-ads.ts --apply
