name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Roda diariamente às 8h UTC (5h BRT) para validar produção
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - local

jobs:
  test:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # PRODUÇÃO (cron diário ou manual): roda full suite contra electiolab.com
      - name: Run E2E tests against production
        if: github.event_name == 'schedule' || github.event.inputs.target == 'production'
        run: npm run test:e2e:prod
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}

      # PR/PUSH: roda apenas testes públicos (não exige envs Stripe/Beehiiv)
      # Aguarda deploy do Vercel preview e roda contra a URL
      - name: Get Vercel preview URL
        id: vercel
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: zentered/vercel-preview-url@v1.4.0
        continue-on-error: true
        with:
          vercel_team_id: ${{ secrets.VERCEL_TEAM_ID }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Run public E2E tests against Vercel preview
        if: |
          (github.event_name == 'pull_request' || github.event_name == 'push')
          && steps.vercel.outputs.preview_url != ''
        run: npx playwright test public-pages
        env:
          E2E_BASE_URL: https://${{ steps.vercel.outputs.preview_url }}

      - name: Skip E2E (no Vercel preview available)
        if: |
          (github.event_name == 'pull_request' || github.event_name == 'push')
          && steps.vercel.outputs.preview_url == ''
        run: |
          echo "::warning::Vercel preview not detected. Skipping E2E. Configure VERCEL_TOKEN + VERCEL_TEAM_ID secrets to enable."

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
