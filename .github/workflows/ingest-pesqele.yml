name: Ingest TSE PesqEle (daily)

on:
  schedule:
    # Diário 11:00 UTC (08:00 BRT) — TSE atualiza às madrugadas
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Ano do PesqEle (default 2026)"
        required: false
        default: "2026"
      skip_wikipedia:
        description: "Pular ingestão Wikipedia (true/false)"
        required: false
        default: "false"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Ingest pesqele_registry
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          YEAR_ARG=""
          if [ -n "${{ inputs.year }}" ]; then YEAR_ARG="--year=${{ inputs.year }}"; fi
          npx tsx scripts/ingest-pesqele.ts --apply $YEAR_ARG

      - name: Auto-ingest Wikipedia (governadores)
        if: ${{ inputs.skip_wikipedia != 'true' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/auto-ingest-wikipedia.ts --type=governador --apply

      - name: Match drafts → PesqEle
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/match-drafts-to-pesqele.ts --apply

      - name: Summary
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/check-poll-freshness.ts | tee freshness-report.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pesqele-daily-report
          path: freshness-report.txt
          retention-days: 30

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const title = `🚨 Cron PesqEle falhou — ${today}`;
            // Dedupe: se já existe issue aberta com o mesmo título, comenta nela
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "cron-failure",
              per_page: 50,
            });
            const existing = issues.find((i) => i.title.includes("Cron PesqEle falhou"));
            const body = [
              `Workflow **Ingest TSE PesqEle (daily)** falhou.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Quando:** ${new Date().toISOString()}`,
              `**Disparo:** ${context.eventName}`,
              ``,
              `Investigar logs e, se necessário, rodar manual:`,
              `\`\`\`bash`,
              `gh workflow run ingest-pesqele.yml`,
              `\`\`\``,
            ].join("\n");
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Nova falha — ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["cron-failure", "automated"],
              });
            }
